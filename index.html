<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>راهنمای مسیر محل‌های استقرار</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{

background:linear-gradient(160deg,#0f5132,#198754,#e8f5e9);

min-height:100vh;

padding:25px;

}

header{

text-align:center;

color:white;

margin-bottom:35px;

}

header h1{

font-size:34px;

font-weight:800;

margin-bottom:12px;

}

header p{

font-size:18px;

opacity:.95;

line-height:34px;

}

.container{

max-width:800px;

margin:auto;

}

.card{

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

border-radius:20px;

padding:20px;

margin-bottom:18px;

display:flex;

justify-content:space-between;

align-items:center;

color:white;

cursor:pointer;

transition:.3s;

box-shadow:0 8px 25px rgba(0,0,0,.15);

}

.card:hover{

transform:translateY(-5px);

background:rgba(255,255,255,.25);

}

.icon{

font-size:34px;

margin-left:15px;

}

.title{

flex:1;

}

.title h2{

font-size:22px;

margin-bottom:5px;

}

.title span{

font-size:15px;

opacity:.9;

}

.arrow{

font-size:26px;

}

footer{

margin-top:35px;

text-align:center;

color:white;

font-size:14px;

opacity:.9;

}

</style>

</head>

<body>

<header>

<h1>📍 راهنمای مسیر محل‌های استقرار</h1>

<p>

استقبال و خدمت‌رسانی به شرکت‌کنندگان در مراسم تشییع رهبر

</p>

</header>

<div class="container">

<!-- کارت‌ها اینجا قرار می‌گیرند -->

</div>

<footer>

با انتخاب هر مقصد، مسیر در اپلیکیشن نشان باز خواهد شد.

</footer>

</body>

</html>
